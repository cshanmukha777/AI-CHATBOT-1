<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern AI Chatbot</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="chat-container">
        <header class="chat-header">
            <h1>AI Assistant</h1>
            <p>Powered by OpenRouter & Hugging Face</p>
        </header>

        <main class="chat-area" id="chatArea">
            <!-- Messages will be injected here dynamically -->
        </main>

        <div class="typing-indicator" id="typingIndicator" style="display: none;">
            <span>AI is typing</span><span class="dots">...</span>
        </div>

        <footer class="chat-input-area">
            <div class="input-container">
                <input type="text" id="userInput" placeholder="Type a message..." autocomplete="off">
            </div>
            <div class="button-group">
                <button id="sendBtn" class="btn primary-btn" title="Send Message">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
                <button id="generateImageBtn" class="btn secondary-btn" title="Generate Image">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                </button>
            </div>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
